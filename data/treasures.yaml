# ─── Trap Types ──────────────────────────────────────────────────────────────
trap_table:
  1:
    type: "pit"
    name: "Pit Trap"
    trigger: "Pressure plate in the floor (10×10ft section)"
    effect: "Fall 10ft (1d6 damage). Save vs. paralysis to grab ledge."
  2:
    type: "spear"
    name: "Spear Trap"
    trigger: "Tripwire across doorway or path"
    effect: "1d4+1 spears fire from wall holes. Each target in 10ft: +4 to hit, 1d6 damage."
  3:
    type: "gas"
    name: "Poison Gas Trap"
    trigger: "Pressure plate or moving an object on a pedestal"
    effect: "Gas fills room (2d6 rounds). Save vs. poison each round or take 1d6 damage. Dissipates when door is opened."
  4:
    type: "falling_block"
    name: "Falling Block"
    trigger: "Pressure plate or removing an item from a plinth"
    effect: "Stone block (400 lbs) drops from ceiling. 1d8 damage, save vs. petrify (paralysis) to dodge. Door may seal."
  5:
    type: "magic"
    name: "Magic Trap"
    trigger: "Touching a glowing rune, gem, or magical object"
    effect: "Roll d6: 1-2 sleep spell, 3-4 hold person, 5 lightning bolt (3d6, save vs. spells for half), 6 curse (save vs. spells or -2 to all rolls until removed)."
  6:
    type: "alarm"
    name: "Alarm Trap"
    trigger: "Tripwire or pressure plate near the entrance"
    effect: "Loud bell or horn sounds. Roll for wandering monster immediately and again in 1d3 turns. No direct damage."
