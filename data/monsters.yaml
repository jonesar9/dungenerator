# Monster tables by theme and level band.
# Levels 1-2, 3-4, 5-6 are the three bands.
# Each band has a d6 table (entries 1-6).
# Stats follow OSE format: HD, AC, attacks, damage, save, morale, xp, treasure_type.
# 'count' is a dice expression for dungeon number appearing.
# Behaviors are short phrases for the stat block.

